<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Job Notifications</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:linear-gradient(135deg,#667eea,#764ba2);
    min-height:100vh;
    padding:40px 20px;
}

.container{
    max-width:1200px;
    margin:auto;
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:30px;
    color:white;
    flex-wrap:wrap;
    gap:15px;
}

.search-box{
    background:white;
    padding:8px 15px;
    border-radius:30px;
    display:flex;
    align-items:center;
    width:280px;
}

.search-box input{
    border:none;
    outline:none;
    width:100%;
    font-size:14px;
}

.add-btn{
    background:white;
    padding:8px 15px;
    border-radius:20px;
    text-decoration:none;
    color:#333;
    font-weight:500;
}

.filters{
    margin-bottom:25px;
}

.filter-btn{
    padding:8px 16px;
    border-radius:20px;
    border:none;
    margin-right:10px;
    cursor:pointer;
    background:rgba(255,255,255,0.3);
    color:white;
    transition:0.3s;
}

.filter-btn.active{
    background:white;
    color:#333;
    font-weight:600;
}

.job-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:25px;
}

.job-card{
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(15px);
    border-radius:15px;
    padding:20px;
    color:white;
    transition:0.4s;
}

.job-card:hover{
    transform:translateY(-8px);
    background:rgba(255,255,255,0.25);
}

.badge{
    background:#00ffae;
    color:#333;
    padding:5px 10px;
    border-radius:15px;
    font-size:12px;
    font-weight:600;
    display:inline-block;
    margin-bottom:10px;
}

.apply-btn{
    padding:8px 15px;
    border:none;
    border-radius:20px;
    cursor:pointer;
    background:white;
    color:#333;
    font-weight:500;
    margin-top:10px;
}
</style>
</head>
<body>

<div class="container">

    <div class="header">
        <h1>🔥 Latest Job Notifications</h1>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search jobs...">
        </div>
        <a href="testSeven.html" class="add-btn">➕ Add Job</a>
    </div>

    <div class="filters">
        <button class="filter-btn active" data-type="all">All</button>
        <button class="filter-btn" data-type="Full-Time">Full-Time</button>
        <button class="filter-btn" data-type="Internship">Internship</button>
        <button class="filter-btn" data-type="Remote">Remote</button>
    </div>

    <div class="job-grid" id="jobGrid"></div>

</div>

<script>

const searchInput = document.getElementById("searchInput");
const filterButtons = document.querySelectorAll(".filter-btn");
const jobGrid = document.getElementById("jobGrid");

let currentFilter = "all";

function loadJobs() {
    const jobs = JSON.parse(localStorage.getItem("jobs")) || [];
    jobGrid.innerHTML = "";

    jobs.forEach(job => {
        const card = document.createElement("div");
        card.classList.add("job-card");
        card.setAttribute("data-type", job.type);

        card.innerHTML = `
            <div class="badge">New</div>
            <h3>${job.title}</h3>
            <p class="company">${job.company}</p>
            <p>📍 ${job.location}</p>
            <p>💰 ${job.salary}</p>
            <button class="apply-btn">Apply Now</button>
        `;

        jobGrid.appendChild(card);
    });

    filterJobs();
}

loadJobs();

searchInput.addEventListener("keyup", filterJobs);

filterButtons.forEach(button => {
    button.addEventListener("click", function(){
        filterButtons.forEach(btn => btn.classList.remove("active"));
        this.classList.add("active");

        currentFilter = this.getAttribute("data-type");
        filterJobs();
    });
});

function filterJobs(){
    const searchText = searchInput.value.toLowerCase();
    const jobCards = document.querySelectorAll(".job-card");

    jobCards.forEach(card => {
        const title = card.querySelector("h3").innerText.toLowerCase();
        const company = card.querySelector(".company").innerText.toLowerCase();
        const type = card.getAttribute("data-type");

        const matchesSearch = title.includes(searchText) || company.includes(searchText);
        const matchesFilter = currentFilter === "all" || currentFilter === type;

        card.style.display = (matchesSearch && matchesFilter) ? "block" : "none";
    });
}

</script>

</body>
</html>
