<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Advanced Contact Form</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f9;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .form-container {
      background: #ffffff;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      width: 350px;
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    input, textarea {
      width: 100%;
      padding: 10px;
      margin-bottom: 15px;
      border-radius: 5px;
      border: 1px solid #ccc;
      font-size: 14px;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #007bff;
      border: none;
      color: white;
      font-size: 16px;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: #0056b3;
    }

    .success {
      text-align: center;
      color: green;
      margin-top: 10px;
    }
  </style>
</head>
<body>

<div class="form-container">
  <h2>Contact Form</h2>

  <form id="myForm">
    <input type="text" name="name" placeholder="Your Name" required>
    <input type="email" name="email" placeholder="Your Email" required>
    <input type="tel" name="phone" placeholder="Your Phone" required>
    <textarea name="message" placeholder="Your Message" required></textarea>
    <button type="submit">Submit</button>
  </form>

  <div class="success" id="responseMessage"></div>
</div>

<script>
const form = document.getElementById('myForm');
const responseMessage = document.getElementById('responseMessage');

form.addEventListener('submit', function(e) {
  e.preventDefault();

  const formData = {
    id: Date.now(), // unique ID
    name: form.name.value,
    email: form.email.value,
    phone: form.phone.value,
    message: form.message.value,
    date: new Date().toLocaleString()
  };

  let data = JSON.parse(localStorage.getItem("formDataList")) || [];
  data.push(formData);

  localStorage.setItem("formDataList", JSON.stringify(data));

  responseMessage.innerHTML = "Form submitted successfully!";
  form.reset();
});
</script>

</body>
</html>
