<!DOCTYPE html>
<html>
<head>
<title>Scrollable Div Example</title>

<style>

.scrollBox{
width:300px;
height:200px;      /* fixed height */
border:2px solid black;
overflow-y:scroll; /* enables vertical scrolling */
padding:10px;
}

</style>

</head>

<body>

<h2>Scrollable Div Section</h2>

<div class="scrollBox">

<p>Item 1</p>
<p>Item 2</p>
<p>Item 3</p>
<p>Item 4</p>
<p>Item 5</p>
<p>Item 6</p>
<p>Item 7</p>
<p>Item 8</p>
<p>Item 9</p>
<p>Item 10</p>
<p>Item 11</p>
<p>Item 12</p>

</div>

</body>
</html>
